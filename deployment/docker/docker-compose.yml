# RankIQ — local stack.
#
# By default this brings up the API + UI with VECTOR_BACKEND=faiss (no
# extra service needed). To exercise Qdrant or pgvector instead:
#
#   docker compose -f deployment/docker/docker-compose.yml --profile qdrant up -d
#   # then set VECTOR_BACKEND=qdrant in .env and restart the api service
#
#   docker compose -f deployment/docker/docker-compose.yml --profile pgvector up -d
#   # then set VECTOR_BACKEND=pgvector in .env and restart the api service

services:
  api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: rankiq-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - VECTOR_BACKEND=${VECTOR_BACKEND:-faiss}
      - QDRANT_URL=http://qdrant:6333
      - PGVECTOR_DSN=postgresql://rankiq:rankiq@postgres:5432/rankiq
      - API_AUTH_TOKEN=${API_AUTH_TOKEN}
      - SQLITE_PATH=/app/data/rankiq.db
      - LOG_FORMAT=json
    volumes:
      - rankiq_data:/app/data
    restart: unless-stopped

  ui:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.ui
    container_name: rankiq-ui
    ports:
      - "7860:7860"
    environment:
      - RANKIQ_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: rankiq-qdrant
    profiles: ["qdrant"]
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: pgvector/pgvector:pg16
    container_name: rankiq-postgres
    profiles: ["pgvector"]
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=rankiq
      - POSTGRES_PASSWORD=rankiq
      - POSTGRES_DB=rankiq
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  rankiq_data:
  qdrant_data:
  postgres_data:
